name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Install dependencies
        run: npm ci

      # Собирается из исходников (нужен Go) — поддержка исходящего прокси ещё не
      # попала ни в один тегированный релиз GOWA. См. scripts/build-gowa.mjs.
      - name: Build GOWA engine
        run: npm run build-gowa -- --current

      - name: Run tests
        run: node --test test/*.test.js
